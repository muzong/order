server:
  port: 8080

spring:
  application:
    name: order-pay
  datasource:
    url: jdbc:mysql://localhost:3306/orderpay?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    database: 0
  rocketmq:
    name-server: localhost:9876

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.orderpay.**.infrastructure.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
    com.orderpay: DEBUG
