server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:orderpay}?useUnicode=true&characterEncoding=utf8&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  rocketmq:
    name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}

logging:
  level:
    com.orderpay: WARN
